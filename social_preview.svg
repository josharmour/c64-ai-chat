  <text x="640" y="635" font-family="monospace" font-size="12" fill="#5555AA" text-anchor="middle" letter-spacing="2">
    GITHUB.COM/JOSHARMOUR/C64-AI-CHAT
  </text>

  <!-- Pixel art decorative corners -->
