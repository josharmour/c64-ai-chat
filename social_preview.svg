      <rect x="27" y="12" width="6" height="6"/>
      <rect x="9" y="18" width="6" height="6"/>
      <rect x="33" y="18" width="6" height="6"/>
      <rect x="9" y="24" width="6" height="6"/>
      <rect x="21" y="24" width="6" height="6"/>
