  </g>

  <!-- Connection arrows - pixel style data flow from providers to C64 -->
  <!-- Arrow from providers toward C64 -->
  <g fill="#6C6CFF" opacity="0.6">
    <!-- Data stream dots flowing left -->
    <rect x="720" y="320" width="6" height="6">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="700" y="320" width="6" height="6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="680" y="320" width="6" height="6">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="740" y="320" width="6" height="6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="760" y="320" width="6" height="6">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1s"/>
    </rect>
