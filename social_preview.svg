    <rect x="537" y="540" width="22" height="16" rx="2"/>
    <rect x="563" y="540" width="38" height="16" rx="2"/>
  </g>
  <!-- Row 2 -->
  <g fill="#5C4A32" stroke="#4A3822" stroke-width="1">
    <rect x="95" y="560" width="30" height="16" rx="2"/>
    <rect x="129" y="560" width="22" height="16" rx="2"/>
    <rect x="155" y="560" width="22" height="16" rx="2"/>
    <rect x="181" y="560" width="22" height="16" rx="2"/>
    <rect x="207" y="560" width="22" height="16" rx="2"/>
    <rect x="233" y="560" width="22" height="16" rx="2"/>
