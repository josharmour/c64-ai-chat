    <rect x="1004" y="238" width="8" height="4"/>
    <rect x="1020" y="238" width="8" height="4"/>
    <rect x="1036" y="238" width="8" height="4"/>
    <rect x="1052" y="238" width="8" height="4"/>
    <rect x="1068" y="238" width="8" height="4"/>
    <rect x="1084" y="238" width="8" height="4"/>
    <rect x="1100" y="238" width="8" height="4"/>
    <rect x="1116" y="238" width="8" height="4"/>
    <rect x="1132" y="238" width="8" height="4"/>
    <rect x="1148" y="238" width="8" height="4"/>
  </g>

  <!-- AI Provider icons - pixel art style boxes -->
  <!-- Claude -->
  <g transform="translate(780, 270)">
    <rect width="160" height="60" rx="4" fill="rgba(108,108,255,0.15)" stroke="#6C6CFF" stroke-width="2"/>
    <!-- Pixel brain icon -->
    <g fill="#FF8C6C">
      <rect x="15" y="12" width="6" height="6"/>
      <rect x="21" y="12" width="6" height="6"/>
      <rect x="27" y="12" width="6" height="6"/>
      <rect x="9" y="18" width="6" height="6"/>
      <rect x="15" y="18" width="6" height="6"/>
      <rect x="27" y="18" width="6" height="6"/>
      <rect x="33" y="18" width="6" height="6"/>
      <rect x="9" y="24" width="6" height="6"/>
      <rect x="15" y="24" width="6" height="6"/>
      <rect x="21" y="24" width="6" height="6"/>
      <rect x="27" y="24" width="6" height="6"/>
      <rect x="33" y="24" width="6" height="6"/>
      <rect x="15" y="30" width="6" height="6"/>
      <rect x="21" y="30" width="6" height="6"/>
      <rect x="27" y="30" width="6" height="6"/>
      <rect x="9" y="36" width="6" height="6"/>
      <rect x="15" y="36" width="6" height="6"/>
      <rect x="27" y="36" width="6" height="6"/>
      <rect x="33" y="36" width="6" height="6"/>
    </g>
    <text x="52" y="38" font-family="monospace" font-weight="bold" font-size="18" fill="#FF8C6C">CLAUDE</text>
  </g>

  <!-- Gemini -->
  <g transform="translate(960, 270)">
    <rect width="160" height="60" rx="4" fill="rgba(108,108,255,0.15)" stroke="#6C6CFF" stroke-width="2"/>
    <!-- Pixel star/sparkle icon -->
    <g fill="#4ECDC4">
      <rect x="21" y="10" width="6" height="6"/>
      <rect x="15" y="16" width="6" height="6"/>
      <rect x="21" y="16" width="6" height="6"/>
      <rect x="27" y="16" width="6" height="6"/>
      <rect x="9" y="22" width="6" height="6"/>
      <rect x="15" y="22" width="6" height="6"/>
      <rect x="21" y="22" width="6" height="6"/>
      <rect x="27" y="22" width="6" height="6"/>
      <rect x="33" y="22" width="6" height="6"/>
      <rect x="15" y="28" width="6" height="6"/>
      <rect x="21" y="28" width="6" height="6"/>
