<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Scanline pattern for CRT effect -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(0,0,0,0.12)"/>
    </pattern>
    <!-- Screen glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Outer CRT glow -->
    <filter id="crtglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Pixel grid for 8-bit feel -->
    <pattern id="pixelgrid" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="none" stroke="rgba(0,0,0,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background - dark retro workspace -->
  <rect width="1280" height="640" fill="#1a1a2e"/>

  <!-- Subtle grid background -->
  <rect width="1280" height="640" fill="url(#pixelgrid)"/>

  <!-- ========== C64 MONITOR/SCREEN ========== -->
  <!-- Monitor outer bezel -->
  <rect x="60" y="40" width="580" height="440" rx="12" fill="#8B7355" stroke="#6B5335" stroke-width="3"/>
  <!-- Monitor inner bezel -->
  <rect x="75" y="55" width="550" height="410" rx="8" fill="#5C4A32"/>
  <!-- Screen border (C64 light blue border) -->
  <rect x="90" y="70" width="520" height="380" rx="4" fill="#6C6CFF"/>
  <!-- Screen area (C64 dark blue) -->
  <rect x="110" y="90" width="480" height="340" fill="#4040E0"/>
  <!-- Scanlines over screen -->
  <rect x="110" y="90" width="480" height="340" fill="url(#scanlines)"/>

  <!-- Screen content - C64 style text -->
  <g filter="url(#textglow)">
    <!-- C64 startup look -->
    <text x="130" y="125" font-family="monospace" font-size="15" fill="#6C6CFF" letter-spacing="1">
      **** COMMODORE 64 AI CHAT ****
    </text>
    <text x="130" y="150" font-family="monospace" font-size="13" fill="#6C6CFF" letter-spacing="1">
      64K RAM SYSTEM
    </text>

    <!-- Chat conversation -->
    <text x="130" y="185" font-family="monospace" font-size="14" fill="#6C6CFF" letter-spacing="1">
      CLAUDE>
    </text>
    <text x="130" y="210" font-family="monospace" font-size="13" fill="#A0A0FF" letter-spacing="1">
      WHAT IS THE MEANING OF LIFE?
    </text>

    <text x="130" y="245" font-family="monospace" font-size="13" fill="#E0E0FF" letter-spacing="0.5">
      THE MEANING OF LIFE IS A DEEPLY
    </text>
    <text x="130" y="265" font-family="monospace" font-size="13" fill="#E0E0FF" letter-spacing="0.5">
      PERSONAL JOURNEY. SOME FIND IT
    </text>
    <text x="130" y="285" font-family="monospace" font-size="13" fill="#E0E0FF" letter-spacing="0.5">
      IN CONNECTION, CREATIVITY, OR
    </text>
    <text x="130" y="305" font-family="monospace" font-size="13" fill="#E0E0FF" letter-spacing="0.5">
      THE PURSUIT OF KNOWLEDGE...
    </text>

    <!-- Blinking cursor -->
    <rect x="130" y="325" width="10" height="14" fill="#6C6CFF">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="337" font-family="monospace" font-size="14" fill="#6C6CFF" letter-spacing="1">
      _
    </text>

    <!-- Status line -->
    <text x="130" y="405" font-family="monospace" font-size="11" fill="#5050C0" letter-spacing="1">
      /PROVIDER  /MODEL  /HELP  QUIT
    </text>
  </g>

  <!-- Monitor stand -->
  <rect x="270" y="480" width="160" height="15" rx="2" fill="#7A6545"/>
  <rect x="300" y="495" width="100" height="25" rx="2" fill="#6B5335"/>

  <!-- ========== C64 KEYBOARD ========== -->
  <!-- Keyboard body -->
  <rect x="80" y="530" width="540" height="85" rx="6" fill="#8B7355" stroke="#6B5335" stroke-width="2"/>

  <!-- Keyboard keys - row 1 -->
