  </g>
  <!-- Row 3 - with space bar -->
  <g fill="#5C4A32" stroke="#4A3822" stroke-width="1">
    <rect x="95" y="580" width="38" height="16" rx="2"/>
    <rect x="137" y="580" width="22" height="16" rx="2"/>
    <rect x="163" y="580" width="22" height="16" rx="2"/>
    <rect x="189" y="580" width="22" height="16" rx="2"/>
    <rect x="215" y="580" width="22" height="16" rx="2"/>
    <rect x="241" y="580" width="22" height="16" rx="2"/>
    <rect x="267" y="580" width="22" height="16" rx="2"/>
    <rect x="293" y="580" width="22" height="16" rx="2"/>
    <rect x="319" y="580" width="22" height="16" rx="2"/>
    <rect x="345" y="580" width="22" height="16" rx="2"/>
    <rect x="371" y="580" width="22" height="16" rx="2"/>
    <rect x="397" y="580" width="22" height="16" rx="2"/>
    <rect x="423" y="580" width="22" height="16" rx="2"/>
    <rect x="449" y="580" width="152" height="16" rx="2"/>
  </g>

  <!-- C= key highlight -->
  <rect x="95" y="580" width="38" height="16" rx="2" fill="#4040E0" stroke="#3030B0" stroke-width="1"/>

  <!-- F-keys on the right side -->
  <g fill="#6B5335" stroke="#5A4325" stroke-width="1">
    <rect x="565" y="560" width="36" height="16" rx="2"/>
    <rect x="565" y="580" width="36" height="16" rx="2"/>
  </g>

  <!-- ========== RIGHT SIDE: AI PROVIDERS + TITLE ========== -->

  <!-- Main title -->
  <g filter="url(#crtglow)">
    <!-- "C64" in large pixel style -->
    <text x="780" y="120" font-family="monospace" font-weight="bold" font-size="72" fill="#6C6CFF" letter-spacing="6">
      C64
    </text>
    <text x="780" y="180" font-family="monospace" font-weight="bold" font-size="52" fill="#A0A0FF" letter-spacing="4">
      AI CHAT
    </text>
  </g>

  <!-- Tagline -->
  <text x="780" y="220" font-family="monospace" font-size="16" fill="#7878AA" letter-spacing="1">
    MODERN AI ON VINTAGE HARDWARE
  </text>

  <!-- Divider line - pixel style -->
  <g fill="#6C6CFF" opacity="0.5">
    <rect x="780" y="238" width="8" height="4"/>
    <rect x="796" y="238" width="8" height="4"/>
    <rect x="812" y="238" width="8" height="4"/>
    <rect x="828" y="238" width="8" height="4"/>
    <rect x="844" y="238" width="8" height="4"/>
    <rect x="860" y="238" width="8" height="4"/>
