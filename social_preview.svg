    <rect x="1100" y="480" width="4" height="4">
      <animate attributeName="y" values="480;460;480" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="850" y="450" width="4" height="4">
      <animate attributeName="y" values="450;430;450" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="1000" y="500" width="4" height="4">
      <animate attributeName="y" values="500;475;500" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="1180" y="440" width="4" height="4">
