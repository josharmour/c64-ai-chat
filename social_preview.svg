    </g>
    <text x="48" y="38" font-family="monospace" font-weight="bold" font-size="18" fill="#4ECDC4">GEMINI</text>
  </g>

  <!-- OpenAI -->
  <g transform="translate(780, 350)">
    <rect width="160" height="60" rx="4" fill="rgba(108,108,255,0.15)" stroke="#6C6CFF" stroke-width="2"/>
    <!-- Pixel hexagon/circle icon -->
    <g fill="#74D477">
      <rect x="15" y="12" width="6" height="6"/>
