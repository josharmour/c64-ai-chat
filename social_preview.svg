  <!-- "PYTHON PROXY" label between C64 and providers -->
  <g transform="translate(680, 280)">
    <rect x="0" y="0" width="90" height="24" rx="3" fill="rgba(108,108,255,0.2)" stroke="#6C6CFF" stroke-width="1" stroke-dasharray="4,2"/>
