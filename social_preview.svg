    <rect x="389" y="560" width="22" height="16" rx="2"/>
    <rect x="415" y="560" width="22" height="16" rx="2"/>
    <rect x="441" y="560" width="22" height="16" rx="2"/>
    <rect x="467" y="560" width="22" height="16" rx="2"/>
    <rect x="493" y="560" width="22" height="16" rx="2"/>
    <rect x="519" y="560" width="22" height="16" rx="2"/>
