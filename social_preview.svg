      <rect x="21" y="36" width="6" height="6"/>
      <rect x="27" y="36" width="6" height="6"/>
    </g>
    <text x="48" y="38" font-family="monospace" font-weight="bold" font-size="18" fill="#74D477">OPENAI</text>
  </g>

  <!-- Ollama -->
  <g transform="translate(960, 350)">
    <rect width="160" height="60" rx="4" fill="rgba(108,108,255,0.15)" stroke="#6C6CFF" stroke-width="2"/>
    <!-- Pixel llama icon -->
